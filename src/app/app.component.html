<style>
  :host {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 14px;
    color: #333;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .content {
    display: flex;
    margin: 82px auto 32px;
    padding: 0 16px;
    max-width: 960px;
    flex-direction: column;
    align-items: center;
  }
</style>

<div class="container is-max-tablet pt-6">
  <div class="toolbar">
    <mat-tab-group class="tab-group" (selectedIndexChange)="activeTab = $event">
      <mat-tab label="create-tab">
        @if (activeTab === 0) {
          <app-create-form></app-create-form>
        }
      </mat-tab>
      <mat-tab label="edit-tab">
        @if (activeTab === 1) {
          <app-edit-form></app-edit-form>
        }
      </mat-tab>
      <mat-tab label="manage-tab">
        @if (activeTab === 2) {
          <app-manage-form></app-manage-form>
        }
      </mat-tab>
    </mat-tab-group>
  </div>
</div>

<router-outlet></router-outlet>
