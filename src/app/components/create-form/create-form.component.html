<div class="create-form-container mt-4">
  <h2 class="title is-2">Créer une news</h2>
  <form (ngSubmit)="onCreate()" #newsForm="ngForm" class="box">

    <!-- Titre -->
    <div class="field">
      <label class="label">Titre <span class="has-text-danger">*</span></label>
      <div class="control">
        <input
          class="input"
          [class.is-danger]="titleField.invalid && titleField.touched"
          [class.is-success]="titleField.valid && titleField.touched"
          type="text"
          placeholder="Titre de la news"
          name="title"
          [(ngModel)]="formData.title"
          #titleField="ngModel"
          required
        />
      </div>
      @if (titleField.invalid && titleField.touched) {
        <p class="help is-danger">Le titre est requis.</p>
      }
    </div>

    <!-- Description -->
    <div class="field">
      <label class="label">Description <span class="has-text-danger">*</span></label>
      <div class="control">
        <textarea
          class="textarea"
          [class.is-danger]="descField.invalid && descField.touched"
          [class.is-success]="descField.valid && descField.touched"
          placeholder="Résumé court de la news"
          name="description"
          [(ngModel)]="formData.description"
          #descField="ngModel"
          rows="3"
          required
        ></textarea>
      </div>
      @if (descField.invalid && descField.touched) {
        <p class="help is-danger">La description est requise.</p>
      }
    </div>

    <!-- Contenu -->
    <div class="field">
      <label class="label">Contenu <span class="has-text-danger">*</span></label>
      <div class="control">
        <textarea
          class="textarea"
          [class.is-danger]="contentField.invalid && contentField.touched"
          [class.is-success]="contentField.valid && contentField.touched"
          placeholder="Contenu complet de la news"
          name="content"
          [(ngModel)]="formData.content"
          #contentField="ngModel"
          rows="8"
          required
        ></textarea>
      </div>
      @if (contentField.invalid && contentField.touched) {
        <p class="help is-danger">Le contenu est requis.</p>
      }
    </div>

    <!-- Catégorie -->
    <div class="field">
      <label class="label">Catégorie</label>
      <app-category-select
        [categories]="existingCategories"
        [value]="formData.category"
        (valueChange)="onCategoryChange($event)">
      </app-category-select>
    </div>

    <!-- Date + Lieu sur la même ligne -->
    <div class="columns">
      <div class="column">
        <div class="field">
          <label class="label">Date de l'événement</label>
          <div class="control">
            <input class="input" type="date" name="date_event" [(ngModel)]="formData.date_event" />
          </div>
        </div>
      </div>
      <div class="column">
        <div class="field">
          <label class="label">Lieu</label>
          <div class="control has-icons-left">
            <input class="input" type="text" placeholder="Ville, pays…" name="location" [(ngModel)]="formData.location" />
            <span class="icon is-small is-left">
              <i class="material-symbols-outlined" style="font-size: 18px;" translate="no">location_on</i>
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bouton de soumission -->
    <div class="field">
      <div class="control">
        <button
          class="button is-primary"
          [class.is-loading]="isSubmitting"
          type="submit"
          [disabled]="!newsForm.form.valid || isSubmitting"
        >
          Créer la news
        </button>
      </div>
    </div>

  </form>
</div>
